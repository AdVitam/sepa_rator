plugins:
  - rubocop-performance
  - rubocop-rspec

RSpec/ExampleLength:
  Max: 20

RSpec/MultipleExpectations:
  Max: 10

RSpec/NestedGroups:
  Max: 5

RSpec/DescribeClass:
  Exclude:
    - 'spec/message_spec.rb'
    - 'spec/validation_spec.rb'
    - 'spec/public_api_spec.rb'

# Non-autocorrectable cops that require significant manual rework of existing tests.
# These are acceptable in test files per project guidelines.
RSpec/DescribeSymbol:
  Enabled: false

RSpec/SpecFilePathFormat:
  Enabled: false

RSpec/ContextWording:
  Enabled: false

RSpec/NamedSubject:
  Enabled: false

RSpec/MultipleDescribes:
  Enabled: false

RSpec/RepeatedDescription:
  Enabled: false

RSpec/ExpectActual:
  Enabled: false

RSpec/MultipleMemoizedHelpers:
  Enabled: false

RSpec/DescribedClass:
  Enabled: false

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false
  Exclude:
    - 'vendor/**/*'
    - 'gemfiles/**/*'
    - 'coverage/**/*'

# Gem-appropriate settings
Style/Documentation:
  Enabled: false

Style/FrozenStringLiteralComment:
  Enabled: true
  EnforcedStyle: always

Metrics/BlockLength:
  Max: 60
  Exclude:
    - 'spec/**/*'
    - '*.gemspec'

Metrics/MethodLength:
  Max: 60
  Exclude:
    - 'spec/**/*'

Metrics/AbcSize:
  Max: 60
  Exclude:
    - 'spec/**/*'

Metrics/ClassLength:
  Max: 180

Metrics/ModuleLength:
  Max: 220

# Profile constants are named after ISO 20022 schema versions (SCT_03, SDD_08, ...),
# which use numeric suffixes intentionally. The same applies to `let(:sdd_02)` helpers
# in specs — the version is part of the identity, not an incidental index.
Naming/VariableNumber:
  Enabled: false

RSpec/IndexedLet:
  Enabled: false

Metrics/CyclomaticComplexity:
  Max: 15

Metrics/PerceivedComplexity:
  Max: 15

Layout/LineLength:
  Max: 170
  Exclude:
    - 'spec/**/*'

Naming/MethodParameterName:
  AllowedNames:
    - t

Style/ClassAndModuleChildren:
  Enabled: false

Style/IfInsideElse:
  Enabled: false

# XML builder methods use String#% for consistent decimal formatting
Style/FormatString:
  Enabled: false
